<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 ACCESS DENIED | alif-cybersec</title>
    <link rel="icon" type="image/x-icon" href="fav.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; --dark: #020617; }
        body { 
            background-color: var(--dark); color: #e2e8f0; font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .terminal-font { font-family: 'Fira Code', monospace; }
        .glow-text { text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .accent-emerald { color: var(--accent); }
        
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9999; background-size: 100% 4px; pointer-events: none; opacity: 0.2;
        }

        .error-code {
            font-size: 10rem; font-weight: 900; line-height: 1;
            color: #fff; letter-spacing: -0.05em; position: relative;
            display: inline-block;
        }
        
        /* Controlled Glitch */
        .error-code::before, .error-code::after {
            content: "404"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); clip: rect(0, 0, 0, 0);
        }
        .error-code::before {
            left: 2px; text-shadow: -2px 0 #ff00c1;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .error-code::after {
            left: -2px; text-shadow: -2px 0 #00fff9;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 21px, 0); }
            20% { clip: rect(45px, 9999px, 46px, 0); }
            40% { clip: rect(10px, 9999px, 11px, 0); }
            60% { clip: rect(80px, 9999px, 81px, 0); }
            80% { clip: rect(30px, 9999px, 31px, 0); }
            100% { clip: rect(60px, 9999px, 61px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(15px, 9999px, 16px, 0); }
            25% { clip: rect(55px, 9999px, 56px, 0); }
            50% { clip: rect(5px, 9999px, 6px, 0); }
            75% { clip: rect(90px, 9999px, 91px, 0); }
            100% { clip: rect(40px, 9999px, 41px, 0); }
        }
    </style>
</head>
<body class="antialiased">
    <div class="text-center px-6 relative z-10">
        <div class="inline-block mb-6 px-4 py-1.5 border border-red-500/30 rounded bg-red-500/5 text-red-500 text-[10px] font-bold uppercase tracking-[0.4em] animate-pulse">
            Terminal Error: Object_Not_Found
        </div>
        
        <div>
            <h1 class="error-code glow-text">404</h1>
        </div>
        
        <div class="mt-10 mb-12 max-w-md mx-auto">
            <p class="terminal-font text-emerald-400 text-sm md:text-base leading-relaxed">
                <span class="text-slate-500"># System scan complete...</span><br>
                > Status: <span class="text-white">ACCESS_DENIED</span><br>
                > Trace: <span class="text-slate-400">Bahkan tool recon terbaik kami pun tidak bisa menemukan apa yang Anda cari. Silahkan kembali.</span>
            </p>
        </div>

        <a href="index.html" class="inline-flex items-center px-10 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-lg transition-all transform hover:scale-105 shadow-lg shadow-emerald-500/20 gap-3 group">
            <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            BACK TO SAFE ZONE
        </a>
        
        <div class="mt-20 text-slate-800 text-[9px] terminal-font uppercase tracking-[0.3em]">
            Connection: Terminated | Log_ID: 0x404_ALIF_SEC
        </div>
    </div>
</body>
</html>
